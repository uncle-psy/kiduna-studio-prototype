<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Choose your movements · Kiduna</title>
  <link rel="stylesheet" href="/journey/landing/styles.css">
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html { background: var(--bg-deep); scroll-behavior: smooth; }
    body { margin: 0; min-width: 280px; background: var(--bg-deep); color: var(--fg); }
    button, input, select { font: inherit; }
    button { color: inherit; }
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0, 0, 0, 0); white-space: nowrap; border: 0; }
    ::selection { background: var(--accent); color: #08272a; }
    .shell { min-height: 100vh; background: var(--bg-deep); }
    .header {
      position: sticky; top: 0; z-index: 60; min-height: 64px; display: flex;
      align-items: center; justify-content: space-between; gap: 20px;
      padding: 12px max(24px, calc((100vw - 1200px) / 2));
      background: rgba(18, 12, 7, .88); backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .logo { display: block; line-height: 0; }
    .logo img { display: block; height: 28px; width: auto; }
    .header-actions { display: flex; align-items: center; justify-content: flex-end; gap: 16px; }
    .header-label { font-size: 10px; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; color: var(--fg-dim); }
    .text-action { border: 0; padding: 7px 0; background: none; color: var(--fg-soft); font-size: 13px; font-weight: 700; cursor: pointer; }
    .text-action:hover, .text-action:focus-visible { color: var(--fg); }
    .arrow { color: var(--accent); }
    .content { position: relative; width: 100%; max-width: 1160px; margin: 0 auto; padding: 56px 24px 144px; }
    .content::before {
      content: ""; position: absolute; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse at 50% -10%, rgba(42,26,43,.55), transparent 45%), radial-gradient(circle at 85% 15%, rgba(3,204,217,.04), transparent 30%);
    }
    .hero, .controls, .chips, .count, .grid, .empty { position: relative; }
    .hero { max-width: 640px; margin: 0 auto 40px; text-align: center; animation: fade-up .6s ease-out both; }
    .eyebrow { display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 14px; color: var(--accent); font-size: 10px; font-weight: 900; letter-spacing: .18em; text-transform: uppercase; }
    .spark { color: var(--kid-sun-gold); font-size: 14px; }
    h1 { margin: 0 0 14px; font-size: clamp(32px, 4vw, 46px); line-height: 1.08; }
    h1 em { color: var(--kid-sun-gold); font-family: var(--font-display); }
    .hero p { margin: 0; color: var(--fg-muted); font-size: 15px; line-height: 1.6; }
    .controls { display: flex; gap: 10px; margin-bottom: 14px; animation: fade-up .6s ease-out .1s both; }
    .search, .sort {
      min-height: 46px; border: 1px solid var(--border-strong); border-radius: 4px;
      background: rgba(18, 12, 7, .7); color: var(--fg); font-size: 14px;
    }
    .search { flex: 1; min-width: 0; padding: 12px 16px; }
    .search::placeholder { color: rgba(255,251,245,.28); }
    .sort { padding: 0 38px 0 14px; color: var(--fg-muted); font-size: 13px; font-weight: 700; cursor: pointer; }
    .search:focus, .sort:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 2px rgba(3,204,217,.12); }
    .chips { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; animation: fade-up .6s ease-out .15s both; }
    .chip { padding: 7px 15px; border: 1px solid var(--border); border-radius: 999px; background: transparent; color: var(--fg-soft); font-size: 12px; font-weight: 700; cursor: pointer; transition: border-color 160ms ease, color 160ms ease, background 160ms ease; }
    .chip:hover, .chip:focus-visible { border-color: rgba(3,204,217,.5); color: var(--fg); outline: none; }
    .chip[aria-pressed="true"] { border-color: var(--accent); background: rgba(3,204,217,.12); color: var(--accent); }
    .count { margin-bottom: 16px; color: var(--fg-dim); font-size: 12px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 14px; }
    .org-card {
      position: relative; min-height: 190px; display: flex; flex-direction: column; gap: 10px;
      padding: 20px; border: 1px solid rgba(193,154,107,.15); border-radius: 14px;
      background: rgba(30,21,14,.5); text-align: left; cursor: pointer;
      transition: border-color 160ms ease, background 160ms ease, transform 160ms ease;
    }
    .org-card:not(:disabled):hover, .org-card:not(:disabled):focus-visible { transform: translateY(-2px); border-color: rgba(3,204,217,.45); outline: none; }
    .org-card[aria-pressed="true"] { border-color: rgba(3,204,217,.5); background: rgba(3,204,217,.05); }
    .org-card.locked { border-color: rgba(234,170,0,.35); background: rgba(234,170,0,.04); cursor: default; opacity: 1; }
    .org-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .org-name { font-family: var(--font-display); font-size: 19px; line-height: 1.2; color: var(--fg); }
    .check { flex: 0 0 24px; width: 24px; height: 24px; display: grid; place-items: center; border: 1px solid var(--border-strong); border-radius: 50%; font-size: 13px; font-weight: 900; color: #08272a; }
    .org-card[aria-pressed="true"] .check { border-color: var(--accent); background: var(--accent); }
    .org-card.locked .check { border-color: rgba(234,170,0,.4); background: rgba(234,170,0,.15); color: var(--kid-sun-gold); }
    .locked-pill { align-self: flex-start; padding: 3px 10px; border: 1px solid rgba(234,170,0,.3); border-radius: 999px; background: rgba(234,170,0,.1); color: var(--kid-sun-gold); font-size: 9px; font-weight: 900; letter-spacing: .12em; text-transform: uppercase; }
    .org-desc { flex: 1; margin: 0; color: var(--fg-soft); font-size: 12.5px; line-height: 1.55; }
    .org-meta { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .org-tags { color: var(--kin-camel); font-size: 10.5px; font-weight: 800; letter-spacing: .04em; }
    .org-metrics { display: flex; align-items: center; gap: 10px; white-space: nowrap; }
    .compute, .members { color: var(--fg-dim); font-size: 11px; }
    .compute strong, .members strong { font-family: var(--font-display); font-size: 14px; font-weight: 400; }
    .compute strong { color: var(--accent); }
    .members strong { color: var(--fg-muted); }
    .reg-line { padding-top: 9px; border-top: 1px solid rgba(255,248,240,.07); color: var(--fg-dim); font-size: 9.5px; letter-spacing: .05em; }
    .reg-line.proposed { color: var(--kid-sun-gold); }
    .empty { display: none; padding: 64px 24px; text-align: center; }
    .empty.visible { display: block; }
    .empty h2 { margin: 0 0 8px; color: var(--fg-muted); font-size: 22px; }
    .empty p { margin: 0 0 18px; color: var(--fg-soft); font-size: 13px; }
    .clear { padding: 10px 24px; border: 1px solid rgba(3,204,217,.5); border-radius: 4px; background: transparent; color: var(--accent); font-size: 13px; font-weight: 800; cursor: pointer; }
    .tray { position: fixed; left: 0; right: 0; bottom: 0; z-index: 70; border-top: 1px solid var(--border); background: rgba(18,12,7,.92); backdrop-filter: blur(14px); }
    .tray-inner { max-width: 1160px; margin: 0 auto; padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; gap: 20px; }
    .tray-copy { min-width: 0; }
    .tray-count { margin-bottom: 3px; color: var(--accent); font-size: 10px; font-weight: 900; letter-spacing: .14em; text-transform: uppercase; }
    .tray-summary { overflow: hidden; color: var(--fg-soft); font-size: 12px; text-overflow: ellipsis; white-space: nowrap; }
    .continue { flex: 0 0 auto; min-height: 48px; padding: 0 32px; border: 0; border-radius: 4px; background: var(--accent); color: #08272a; box-shadow: 0 8px 24px rgba(3,204,217,.15); font-size: 14px; font-weight: 800; cursor: pointer; transition: background 180ms ease, transform 180ms ease; }
    .continue:hover, .continue:focus-visible { background: var(--accent-hover); transform: translateY(-1px); outline: none; }
    .toast { position: fixed; right: 24px; bottom: 94px; z-index: 90; max-width: min(430px, calc(100vw - 48px)); padding: 12px 16px; border: 1px solid rgba(3,204,217,.32); border-radius: 8px; background: rgba(18,12,7,.96); color: var(--fg-muted); box-shadow: var(--shadow-lg); font-size: 12px; line-height: 1.45; opacity: 0; transform: translateY(8px); pointer-events: none; transition: opacity 180ms ease, transform 180ms ease; }
    .toast.visible { opacity: 1; transform: translateY(0); }
    @keyframes fade-up { from { opacity: 0; transform: translateY(18px); } to { opacity: 1; transform: translateY(0); } }
    .paused-motion *, .paused-motion *::before, .paused-motion *::after { animation-play-state: paused !important; transition-duration: 0s !important; }
    @media (max-width: 680px) {
      .header { align-items: flex-start; padding: 14px 18px; }
      .header-label { display: none; }
      .content { padding: 40px 16px 150px; }
      .hero { margin-bottom: 30px; }
      .controls { flex-direction: column; }
      .sort { width: 100%; min-height: 44px; }
      .grid { grid-template-columns: 1fr; }
      .tray-inner { align-items: stretch; padding: 12px 16px; }
      .tray-summary { max-width: calc(100vw - 160px); }
      .continue { min-height: 46px; padding: 0 22px; }
      .toast { right: 16px; bottom: 104px; max-width: calc(100vw - 32px); }
    }
    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { scroll-behavior: auto !important; animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition-duration: .01ms !important; }
    }
  </style>
</head>
<body>
  <div class="shell">
    <header class="header">
      <a class="logo" href="/" target="_top" aria-label="Kiduna home">
        <img src="/journey/landing/assets/kiduna-logo-linear-skyblue.svg" alt="Kiduna">
      </a>
      <div class="header-actions">
        <span class="header-label">Choose your movements</span>
        <button class="text-action" id="skip" type="button">Skip for now <span class="arrow">→</span></button>
      </div>
    </header>

    <main class="content">
      <section class="hero" aria-labelledby="page-title">
        <div class="eyebrow"><span>32 Powerful Movements</span><span class="spark">✦</span></div>
        <h1 id="page-title">Put Your Good <em>Where It Does The Most</em></h1>
        <p>Join as many movements as you like — you can always join more later... or build your own! Kinship Duna is home to everyone.</p>
      </section>

      <div class="controls">
        <label class="sr-only" for="search">Search organizations</label>
        <input class="search" id="search" type="search" placeholder="Search organizations…" autocomplete="off">
        <label class="sr-only" for="sort">Sort organizations</label>
        <select class="sort" id="sort">
          <option value="active">Most active</option>
          <option value="members">Most members</option>
          <option value="az">A – Z</option>
          <option value="newest">Newest</option>
          <option value="registered">Registered</option>
          <option value="proposed">Proposed</option>
        </select>
      </div>

      <div class="chips" id="chips" aria-label="Filter organizations by category"></div>
      <div class="count" id="count" aria-live="polite"></div>
      <section class="grid" id="grid" aria-label="Genesis Organizations"></section>
      <section class="empty" id="empty" aria-live="polite">
        <h2>No organizations match</h2>
        <p>Try a different search or clear your filters.</p>
        <button class="clear" id="clear" type="button">Clear filters</button>
      </section>
    </main>

    <aside class="tray" aria-label="Organization selection summary">
      <div class="tray-inner">
        <div class="tray-copy">
          <div class="tray-count" id="tray-count"></div>
          <div class="tray-summary" id="tray-summary"></div>
        </div>
        <button class="continue" id="continue" type="button">Continue →</button>
      </div>
    </aside>
    <div class="toast" id="toast" role="status" aria-live="polite"></div>
  </div>

  <script>
    const organizations = [
      { name: "Kinship Duna", desc: "The founding Kiduna. Builds the agentic internet, capitalizes new organizations, and trains members in governance and the agentic economy.", tags: ["Community"], members: 1204, locked: true },
      { name: "Service Alliance", desc: "For veterans, law enforcement, EMTs, and first responders — history and recognition, real connection, and material support.", tags: ["Community"], members: 312 },
      { name: "Agency", desc: "Your agent for everything that matters: PR, marketing, talent — plus real news distribution from any source to where it should go.", tags: ["Work & Business"], members: 287 },
      { name: "Ansanm Ayiti", desc: "True direct support for Haiti — schools, children, food — building networks and learning the real challenges on the ground.", tags: ["Activism", "Community"], members: 164 },
      { name: "Bihome", desc: "The highly personalized health and wellbeing community. Real information, second opinions, research funding, and help navigating care.", tags: ["Health & Wellbeing"], members: 356 },
      { name: "Black Love", desc: "Exploring and expanding an African American holiday of atonement and connection — deeply linking family and the diaspora.", tags: ["Community", "Culture & Play"], members: 228 },
      { name: "Celebrity Solar", desc: "The Sun is a star. A true solar collective — site analysis, installers, financing, monitoring, and a buying club for the cheapest rates.", tags: ["Climate & Land", "Finance"], members: 198 },
      { name: "Confluence Collective", desc: "Local ecosystem knowledge and community resilience — the watershed, airshed, and foodshed understood as one living system.", tags: ["Climate & Land", "Place-Based"], members: 143 },
      { name: "Contraction", desc: "A complete law firm building AI expertise — templates, advice, and lawyers focused where it counts. Trade name: It’s the Law.", tags: ["Work & Business"], members: 176 },
      { name: "Cosmic Humanity", desc: "Archetypal depth psychology and solar/lunar consciousness — out of binary thinking, beyond power struggles. Based on the work of Howard Teich.", tags: ["Consciousness"], members: 121 },
      { name: "EP Rising", desc: "Activism and resilience for West Virginia’s eastern panhandle — mutual aid, smart growth, local commerce, no data centers.", tags: ["Activism", "Place-Based"], members: 189 },
      { name: "Fanduna", desc: "For entertainers, athletes, authors, and their fans. Crowdfunding, ownership, events, premieres — an ongoing Comicon, plus.", tags: ["Culture & Play"], members: 402 },
      { name: "Freehold Finance", desc: "A collective mortgage and residential finance company — no profit leakage, so it becomes the best place to get your mortgage.", tags: ["Finance"], members: 233 },
      { name: "Flag Tag", desc: "A real-world AR game: plant flags, record experiences, play games within games — local commerce and hometown vibe as play.", tags: ["Culture & Play", "Place-Based"], members: 267 },
      { name: "Homeworld", desc: "For families of all kinds — activities, relationship repair, finance — strengthening your closest circle. Based on the work of Darcia Narvaez.", tags: ["Relationships", "Community"], members: 294 },
      { name: "Hyphal", desc: "The connected job market — gigs, agencies, co-founders, and full-time employment, all in one place.", tags: ["Work & Business"], members: 341 },
      { name: "Indigenous Revival", desc: "Indigenous worldview, trance-based learning, and traditional ecological knowledge. Based on the work of Four Arrows.", tags: ["Consciousness", "Climate & Land"], members: 108 },
      { name: "Lui Mutual", desc: "A mutual insurance company — owned entirely by its members.", tags: ["Finance"], members: 152 },
      { name: "Mapshifting", desc: "Organizational development that puts people first — for Dunas and institutions alike. Based on the work of Reneé Smith.", tags: ["Work & Business"], members: 97 },
      { name: "Mountain River Trail", desc: "Premium local commerce and tourism across West Virginia — connecting every part of the state into one amazing experience.", tags: ["Place-Based"], members: 134 },
      { name: "Mycelial Aid", desc: "Global activism and mutual aid — social justice, environment, climate — transforming the planet from the ground up, inside out.", tags: ["Activism"], members: 219 },
      { name: "Non-Toxic Masculinity", desc: "Initiations for men — countering edgelords and incels. For men and women. Rooted in Bly, Strand, and Soulcraft.", tags: ["Consciousness", "Relationships"], members: 146 },
      { name: "Party Line", desc: "Parties big and small — weddings, raves, clubs, kids’ birthdays, celebrity events — organized at every level.", tags: ["Culture & Play"], members: 258 },
      { name: "Safeword", desc: "The relationship and dating community — all levels, all types, dyads, groups, even just friends. Matchmaking, done right.", tags: ["Relationships"], members: 388 },
      { name: "Soul Kitchen", desc: "Addiction treatment through authentic community building — residential, outpatient, and online. Bringing people together deeply.", tags: ["Health & Wellbeing", "Community"], members: 173 },
      { name: "Tangential", desc: "Investment clubs, angels, VCs, and crowdfunding — entrepreneurs, communities, and investors together.", tags: ["Finance"], members: 265 },
      { name: "The Ceremony Machine", desc: "A global festival — Burning Man everywhere. Immersive digital art across screens, stages, game engines, and festivals.", tags: ["Culture & Play"], members: 310 },
      { name: "The Fellowship of Play", desc: "Designers, publishers, and gamers in one Duna — funding, buying, and playing games of every kind.", tags: ["Culture & Play"], members: 329 },
      { name: "The Long Drum", desc: "Non-extractive support for entrepreneurs and ecosystems in the global south — starting with Nigeria and Indonesia.", tags: ["Activism", "Finance"], members: 117 },
      { name: "Vibe Coast", desc: "The Southern California ecosystem — culture, tech, hospitality, health, and fashion from Venice to San Diego.", tags: ["Place-Based", "Culture & Play"], members: 244 },
      { name: "Wokelord", desc: "Taking back social media — memes with meaning, countering disinformation, making healthy social media fun again.", tags: ["Activism", "Culture & Play"], members: 205 },
      { name: "The Nature of Work", desc: "Organizational development, leadership training, and corporate transformation — helping organizations change how people lead, collaborate, and work together.", tags: ["Work & Business"], members: 1, status: "proposed" }
    ];

    const compute = [52400000, 3800000, 2400000, 640000, 5100000, 1200000, 890000, 310000, 1700000, 220000, 760000, 12800000, 4300000, 6200000, 2900000, 9400000, 180000, 1400000, 96000, 420000, 2100000, 530000, 3200000, 15600000, 980000, 7800000, 11200000, 8700000, 350000, 5600000, 4700000, 0];
    const registrations = [[628407, "Jun 2"], [628411, "Jun 3"], [628415, "Jun 4"], [628422, "Jun 5"], [628428, "Jun 6"], [628433, "Jun 8"], [628439, "Jun 9"], [628444, "Jun 10"], [628450, "Jun 11"], [628457, "Jun 12"], [628463, "Jun 15"], [628470, "Jun 16"], [628476, "Jun 17"], [628481, "Jun 18"], [628488, "Jun 19"], [628494, "Jun 22"], [628501, "Jun 23"], [628507, "Jun 24"], [628514, "Jun 25"], [628520, "Jun 26"], [628527, "Jun 29"], [628534, "Jun 30"], [628541, "Jul 1"], [628548, "Jul 2"], [628556, "Jul 6"], [628563, "Jul 7"], [628571, "Jul 8"], [628580, "Jul 9"], [628588, "Jul 13"], [628595, "Jul 15"], [628602, "Jul 17"], null];
    const tags = ["All", "Community", "Culture & Play", "Activism", "Finance", "Work & Business", "Place-Based", "Climate & Land", "Relationships", "Health & Wellbeing", "Consciousness"];
    const state = { query: "", tag: "All", sort: "active", selected: new Set(["Kinship Duna"]) };
    const grid = document.getElementById("grid");
    const count = document.getElementById("count");
    const chips = document.getElementById("chips");
    const empty = document.getElementById("empty");
    const trayCount = document.getElementById("tray-count");
    const traySummary = document.getElementById("tray-summary");
    const toast = document.getElementById("toast");
    let toastTimer;

    const showNotice = (message) => {
      toast.textContent = message;
      toast.classList.add("visible");
      window.clearTimeout(toastTimer);
      toastTimer = window.setTimeout(() => toast.classList.remove("visible"), 4200);
    };

    const renderChips = () => {
      chips.replaceChildren(...tags.map((tag) => {
        const button = document.createElement("button");
        button.className = "chip";
        button.type = "button";
        button.textContent = tag;
        button.setAttribute("aria-pressed", String(state.tag === tag));
        button.addEventListener("click", () => { state.tag = tag; render(); });
        return button;
      }));
    };

    const filteredOrganizations = () => {
      const query = state.query.trim().toLowerCase();
      const list = organizations.map((org, index) => ({ ...org, index, compute: compute[index], registration: registrations[index], status: org.status || "registered" })).filter((org) => {
        const tagMatch = state.tag === "All" || org.tags.includes(state.tag);
        const queryMatch = !query || `${org.name} ${org.desc} ${org.tags.join(" ")}`.toLowerCase().includes(query);
        const statusMatch = !["registered", "proposed"].includes(state.sort) || org.status === state.sort;
        return tagMatch && queryMatch && statusMatch;
      });
      if (state.sort === "az") list.sort((a, b) => a.name.localeCompare(b.name));
      else if (state.sort === "newest") list.sort((a, b) => b.index - a.index);
      else if (state.sort === "members") list.sort((a, b) => b.members - a.members);
      else if (state.sort === "proposed") list.sort((a, b) => b.index - a.index);
      else list.sort((a, b) => b.compute - a.compute);
      return list;
    };

    const createCard = (org) => {
      const selected = state.selected.has(org.name);
      const card = document.createElement("button");
      card.className = `org-card${org.locked ? " locked" : ""}`;
      card.type = "button";
      card.disabled = Boolean(org.locked);
      card.setAttribute("aria-pressed", String(selected));
      card.setAttribute("aria-label", org.locked ? `${org.name}, founding home, included` : `${selected ? "Remove" : "Add"} ${org.name}`);

      const top = document.createElement("span"); top.className = "org-top";
      const name = document.createElement("span"); name.className = "org-name"; name.textContent = org.name;
      const check = document.createElement("span"); check.className = "check"; check.setAttribute("aria-hidden", "true"); check.textContent = org.locked ? "✦" : selected ? "✓" : "";
      top.append(name, check); card.append(top);

      if (org.locked) { const pill = document.createElement("span"); pill.className = "locked-pill"; pill.textContent = "Founding home · included"; card.append(pill); }
      const desc = document.createElement("span"); desc.className = "org-desc"; desc.textContent = org.desc; card.append(desc);
      const meta = document.createElement("span"); meta.className = "org-meta";
      const tagLine = document.createElement("span"); tagLine.className = "org-tags"; tagLine.textContent = org.tags.join(" · ").toUpperCase();
      const metrics = document.createElement("span"); metrics.className = "org-metrics";
      const computeAmount = document.createElement("span"); computeAmount.className = "compute";
      const computeNumber = document.createElement("strong"); computeNumber.textContent = org.compute >= 1e6 ? `${Math.round(org.compute / 1e5) / 10}M` : `${Math.round(org.compute / 1e3)}K`; computeAmount.append(computeNumber, " compute");
      const members = document.createElement("span"); members.className = "members";
      const memberNumber = document.createElement("strong"); memberNumber.textContent = org.members.toLocaleString(); members.append(memberNumber, " members");
      metrics.append(computeAmount, members); meta.append(tagLine, metrics); card.append(meta);
      const registration = document.createElement("span"); registration.className = `reg-line${org.status === "proposed" ? " proposed" : ""}`; registration.textContent = org.status === "proposed" ? "Proposed · Not yet registered · No Org ID" : `WV Org. ID ${org.registration[0]} · Registered ${org.registration[1]}, 2026`; card.append(registration);

      if (!org.locked) card.addEventListener("click", () => {
        if (state.selected.has(org.name)) state.selected.delete(org.name); else state.selected.add(org.name);
        render();
      });
      return card;
    };

    const renderTray = () => {
      const selected = [...state.selected];
      const others = selected.filter((name) => name !== "Kinship Duna");
      trayCount.textContent = `${selected.length} organization${selected.length === 1 ? "" : "s"} selected`;
      traySummary.textContent = others.length === 0
        ? "Kinship Duna — your founding home. Tap any card to join more."
        : `Kinship Duna + ${others.slice(0, 4).join(", ")}${others.length > 4 ? ` + ${others.length - 4} more` : ""}`;
    };

    const render = () => {
      renderChips();
      const orgs = filteredOrganizations();
      grid.replaceChildren(...orgs.map(createCard));
      count.textContent = orgs.length === organizations.length ? `Showing all ${organizations.length} organizations` : `Showing ${orgs.length} of ${organizations.length} organizations`;
      grid.hidden = orgs.length === 0;
      empty.classList.toggle("visible", orgs.length === 0);
      renderTray();
    };

    document.getElementById("search").addEventListener("input", (event) => { state.query = event.target.value; render(); });
    document.getElementById("sort").addEventListener("change", (event) => { state.sort = event.target.value; render(); });
    document.getElementById("clear").addEventListener("click", () => {
      state.query = ""; state.tag = "All"; document.getElementById("search").value = ""; render();
    });
    document.getElementById("skip").addEventListener("click", () => showNotice("Prototype only · Kinship Duna remains selected; no organization membership was changed."));
    document.getElementById("continue").addEventListener("click", () => showNotice("Prototype only · your organization choices remain a reversible onboarding draft. No memberships or permissions were granted."));
    if (new URLSearchParams(window.location.search).get("reduced") === "1") document.documentElement.classList.add("paused-motion");
    render();
  </script>
</body>
</html>
